<!DOCTYPE html>
<!-- Indica que este documento es HTML5 -->

<html lang="en">
<!-- Comienza el documento HTML y se define el idioma como inglés -->

<head>
    <!-- Cabezera del documento donde se ponen meta, títulos y estilos -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres, UTF-8 soporta acentos y símbolos -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive, se adapta a móviles y tablets -->

    <title>Register</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <!-- Importa el CSS de Bootstrap desde un CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Estilos personalizados para la página */

        body {
            background: linear-gradient(135deg, #e6d6ff, #ffffff);
            /* Degradado de fondo diagonal */
            height: 100vh; 
            /* Hace que el body tenga altura completa de la ventana */
        }

        .card {
            border-radius: 15px; 
            /* Bordes redondeados */
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1); 
            /* Sombra para dar efecto de profundidad */
        }

        .btn-primary {
            background-color: #a66cff; 
            /* Color morado personalizado */
            border: none; 
            /* Quita el borde por defecto de Bootstrap */
        }

        .btn-primary:hover {
            background-color: #8a4de0; 
            /* Color más oscuro al pasar el mouse */
        }

        h2 {
            color: #6a3fb5; 
            /* Color morado del título */
            text-align: center; 
            /* Centra el texto */
        }
    </style>
</head>

<body>
<!-- Cuerpo del documento -->

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <!-- Container de Bootstrap que centra el contenido tanto horizontal como verticalmente -->

    <div class="card p-4" style="width: 300px;">
        <!-- Tarjeta (card) con padding y ancho fijo -->

        <h2>Registro</h2>
        <!-- Título de la tarjeta -->

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <!-- Campo de texto para nombre con margen inferior -->

        <input id="email" class="form-control mb-2" placeholder="Email">
        <!-- Campo de texto para email -->

        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <!-- Campo de contraseña que oculta lo que se escribe -->

        <button class="btn btn-primary w-100" onclick="register()">Registrar</button>
        <!-- Botón que llama a la función register() al hacer clic -->

        <p class="mt-3 text-center">
            <a href="login.html">Ya tengo cuenta</a>
            <!-- Enlace a la página de login si ya tienes cuenta -->
        </p>
    </div>
</div>

<script src="app.js"></script>
<!-- Importa el archivo app.js donde está la lógica de registro -->

</body>
</html>
