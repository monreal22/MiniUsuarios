<!DOCTYPE html>
<!-- Documento HTML5 -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Codificación UTF-8 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive -->

    <title>Home</title>
    <!-- Título de la pestaña -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importa Bootstrap para estilos -->

    <style>
        /* Estilos personalizados */
        body { 
            background: linear-gradient(135deg, #e6d6ff, #ffffff); 
            height: 100vh; 
        }
        .card { 
            border-radius: 15px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1); 
        }
        .btn-danger { 
            background-color: #ff6b81; 
            border: none; 
        }
        .btn-danger:hover { 
            background-color: #e0556a; 
        }
        h2 { 
            color: #6a3fb5; 
            text-align: center; 
        }
    </style>
</head>

<body>
<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <!-- Centra la tarjeta vertical y horizontalmente -->

    <div class="card p-4 text-center" style="width: 300px;">
        <!-- Tarjeta centrada con padding y ancho fijo -->

        <h2 id="usuario"></h2>
        <!-- Aquí se mostrará el nombre o email del usuario logueado -->

        <button class="btn btn-danger mt-3" onclick="logout()">Cerrar sesión</button>
        <!-- Botón para cerrar sesión que llama a logout() -->
    </div>
</div>

<script src="app.js"></script>
<!-- Lógica de la página Home (mostrar usuario y logout) -->

</body>
</html>
